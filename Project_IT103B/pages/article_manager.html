<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý bài viết</title>

    <link rel="stylesheet" href="../css/article_manager.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body>

    <!-- HEADER -->
    <header id="header">
        <div class="top-right" id="topRight">
            <i class="fa-regular fa-envelope" id="iconMail"></i>
            <i class="fa-regular fa-bell" id="iconBell"></i>
            <img src="https://i.pravatar.cc/40" alt="" id="avatar">
        </div>
    </header>

    <!-- ================= MAIN CONTAINER ================= -->
    <div class="container">
        <!-- ===== SIDEBAR ===== -->
        <aside class="sidebar" id="sidebar">

            <a href="../pages/user_manager.html" id="btnUsers">
                <i class="fa-solid fa-users"></i> Manage Users
            </a>

            <a href="../pages/entries_manager.html" id="btnEntries">
                <i class="fa-solid fa-table-list"></i> Manage Entries
            </a>

            <a href="../pages/article_manager.html" id="btnArticles">
                <i class="fa-solid fa-newspaper"></i> Manage Article
            </a>

            <a href="../pages/login.html" id="btnLogout">
                <i class="fa-solid fa-right-from-bracket"></i> Log out
            </a>

        </aside>

        <!-- MAIN CONTENT -->
        <main class="content">

            <!-- Top Section: Tiêu đề và Nút Thêm (hai đầu, thẳng hàng) -->
            <div class="top-section">
                <button class="add-btn" id="addArticleBtn">Thêm mới bài viết</button>
                <h1 class="page-title">Quản lý bài viết</h1>

            </div>

            <!-- Bảng -->
            <div class="table-wrapper">
                <table class="article-table">
                    <thead>
                        <tr>
                            <th>Ảnh</th>
                            <th>Tiêu đề</th>
                            <th>Chủ đề</th>
                            <th>Nội dung</th>
                            <th>Trạng thái</th>
                            <th>Chỉnh sửa trạng thái</th>
                            <th>Hành động</th>
                        </tr>
                    </thead>
                    <tbody>
                        
                    </tbody>
                </table>
            </div>

            <!-- Pagination -->
            <div class="pagination">
                <button class="page-btn"><i class="fa-solid fa-arrow-left" style="color: rgb(5, 5, 5);"></i> &nbsp;Previous</button>
                <div class="page-numbers">
                    
                </div>
                <button class="page-btn">Next &nbsp; <i class="fa-solid fa-arrow-right" style="color: rgb(5, 5, 5);"></i></button>
            </div>
        </main>
    </div>
<script src="../js/article_manager.js"></script>
</body>


</html>
